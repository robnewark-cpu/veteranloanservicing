<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veteran Loan Servicing | Institutional Asset Servicing & Recovery Infrastructure</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        /* Base Design System Tokens */
        :root {
            --bg-primary: #030712;       /* Ultra Dark Slate/Black */
            --bg-secondary: #0b1528;     /* Deep Institutional Navy */
            --bg-card: #111e36;          /* Distinct Layered Card Slate */
            --accent-green: #10b981;     /* High-trust Emerald Green */
            --text-primary: #f9fafb;     /* High-contrast Off-White */
            --text-secondary: #9ca3af;   /* Muted Gray for Body Copy */
            --border-subtle: rgba(255, 255, 255, 0.08);
            --max-width: 1200px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Utilities */
        .container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 24px;
        }

        .highlight {
            color: var(--accent-green);
        }

        .code-pill {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-green);
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid rgba(16, 185, 129, 0.2);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: inline-block;
            margin-bottom: 15px;
        }

        /* Navigation Header */
        nav {
            border-bottom: 1px solid var(--border-subtle);
            background: rgba(3, 7, 18, 0.9);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .logo {
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: -0.02em;
            text-decoration: none;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-green);
            border-radius: 50%;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            margin-left: 24px;
            transition: color 0.2s ease;
        }

        .nav-links a:hover {
            color: var(--text-primary);
        }

        .nav-cta {
            background: transparent;
            border: 1px solid var(--accent-green);
            color: var(--accent-green);
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 500;
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .nav-cta:hover {
            background: var(--accent-green);
            color: var(--bg-primary);
        }

        /* Section Global Spacing */
        section {
            padding: 90px 0 60px 0;
        }

        /* Hero / Insights Section */
        .hero {
            background: radial-gradient(circle at top right, rgba(16, 185, 129, 0.05), transparent 45%);
        }

        .hero-layout {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 48px;
            align-items: center;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            line-height: 1.15;
            letter-spacing: -0.03em;
            margin-bottom: 24px;
        }

        .hero-desc-1 {
            font-size: 1.2rem;
            color: var(--text-primary);
            font-weight: 300;
            margin-bottom: 20px;
        }

        .hero-desc-2 {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        /* System Showcase Panel */
        .hero-visual-panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .panel-row {
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
        }
        .panel-row:last-child { border: none; }
        .panel-label { color: var(--text-secondary); }
        .panel-value { font-family: 'JetBrains Mono', monospace; color: #ffffff; }

        /* Trust/Data Banner */
        .trust-banner {
            border-top: 1px solid var(--border-subtle);
            border-bottom: 1px solid var(--border-subtle);
            background: var(--bg-secondary);
            padding: 24px 0;
        }
        
        .trust-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            text-align: center;
        }

        .stat-num {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .stat-lbl {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Section Headings */
        .section-header {
            margin-bottom: 40px;
            text-align: center;
        }

        .section-header h2 {
            font-size: 2.2rem;
            letter-spacing: -0.02em;
            margin-bottom: 10px;
        }

        .section-header p {
            color: var(--text-secondary);
            max-width: 750px;
            margin: 0 auto;
        }

        /* Framework / Services Block */
        .section-divider {
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .section-divider::before, .section-divider::after {
            content: '';
            display: block;
            width: 80px;
            height: 1px;
            background-color: var(--border-subtle);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            padding: 32px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(16, 185, 129, 0.4);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
        }

        .card h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: #ffffff;
        }

        .card p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* Insights Panel Layout */
        .insights-panel-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 20px;
        }

        .insights-mini-card {
            background: linear-gradient(135deg, var(--bg-secondary), rgba(11, 21, 40, 0.4));
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 24px;
        }

        .insights-mini-card h4 {
            font-size: 1.05rem;
            color: #ffffff;
            margin-bottom: 10px;
            font-family: 'JetBrains Mono', monospace;
        }

        /* About Block Modifications */
        .about-layout {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 60px;
            align-items: start;
        }

        .about-body p {
            font-size: 1.05rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .framework-sidebar {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 35px;
        }

        .framework-sidebar h3 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #ffffff;
        }

        .bullet-list {
            list-style: none;
            margin-top: 15px;
        }

        .bullet-list li {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
            position: relative;
            padding-left: 20px;
        }

        .bullet-list li::before {
            content: "→";
            position: absolute;
            left: 0;
            color: var(--accent-green);
        }

        /* Contact & Proposal Form System */
        .form-section {
            background-image: linear-gradient(to bottom right, var(--bg-secondary), var(--bg-primary));
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 48px;
            max-width: 680px;
            margin: 0 auto 60px auto;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .required-mark {
            color: #ef4444;
            margin-left: 2px;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px 16px;
            background-color: var(--bg-primary);
            border: 1px solid var(--border-subtle);
            border-radius: 6px;
            color: #ffffff;
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.2s ease;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent-green);
        }

        select {
            appearance: none;
            background-repeat: no-repeat;
            background-position: right 16px center;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0 25px 0;
        }

        .checkbox-group input {
            width: auto;
            accent-color: var(--accent-green);
            transform: scale(1.1);
            cursor: pointer;
        }

        .checkbox-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: none;
            letter-spacing: normal;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-green);
            color: var(--bg-primary);
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        button:hover {
            background-color: #059669;
        }

        /* Unified Corporate Footer Block */
        footer {
            border-top: 1px solid var(--border-subtle);
            padding: 50px 0;
            text-align: center;
        }

        .footer-logo {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .footer-email {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: var(--accent-green);
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
        }

        .footer-email:hover { color: #059669; }
        .footer-legal { font-size: 0.8rem; color: var(--text-secondary); }

        /* Responsive Breakpoints */
        @media (max-width: 968px) {
            .hero-layout, .about-layout, .insights-panel-layout { grid-template-columns: 1fr; gap: 32px; }
            h1 { font-size: 2.3rem; }
            .trust-grid { grid-template-columns: repeat(2, 1fr); gap: 20px; }
            .form-row { grid-template-columns: 1fr; gap: 0;
